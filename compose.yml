services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
      POSTGRES_DB: support
    ports:
      - "${SUPPORT_DB_PORT:-5433}:5432"
    volumes:
      - support_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support -d support"]
      interval: 3s
      timeout: 3s
      retries: 10

  support:
    build: .
    ports:
      - "${SUPPORT_PORT:-8090}:8090"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SUPPORT_PORT=8090
      - SUPPORT_DATABASE_URL=postgresql://support:support@db:5432/support
      # CODE_WORKTREE_ROOT stays on volume (not derived from SQLite path)
      - SUPPORT_FREE_FOR_ALL=true
      - HOME=/root
      - PATH=/root/.grok/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - AI_CLI_ADAPTER=${AI_CLI_ADAPTER:-stub}
      - AI_CLI_COMMAND=${AI_CLI_COMMAND:-/app/scripts/ai_diagnose_grok.sh}
      - AI_CLI_USE_PROMPT_FILE=${AI_CLI_USE_PROMPT_FILE:-true}
      - AI_CLI_TIMEOUT_SEC=${AI_CLI_TIMEOUT_SEC:-300}
      - AI_CLI_CWD=${AI_CLI_CWD:-code_root}
      - AI_CLI_PRIMARY_ROOT=${AI_CLI_PRIMARY_ROOT:-backend}
      - AI_GROK_MAX_TURNS=${AI_GROK_MAX_TURNS:-40}
      - GROK_BIN=${GROK_BIN:-grok}
      - DIAGNOSIS_TIMEOUT_SEC=${DIAGNOSIS_TIMEOUT_SEC:-360}
      - DIAGNOSIS_MAX_RETRIES=${DIAGNOSIS_MAX_RETRIES:-2}
      - SUPPORT_KEEP_TICKET_WORKTREES=${SUPPORT_KEEP_TICKET_WORKTREES:-false}
      - CODE_ROOT_APPLIANCE_CONSOLE=${CODE_ROOT_APPLIANCE_CONSOLE:-}
      - CODE_ROOT_APPLIANCE_BACKEND=${CODE_ROOT_APPLIANCE_BACKEND:-}
      - CODE_WORKTREE_ROOT=${CODE_WORKTREE_ROOT:-/data/code_worktrees}
      - SUPPORT_ALERT_EMAIL=${SUPPORT_ALERT_EMAIL:-support@ownedge.ai}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@ownedge.ai}
      - GUIDE_AI_ADAPTER=${GUIDE_AI_ADAPTER:-cli}
      - GUIDE_AI_CLI_COMMAND=${GUIDE_AI_CLI_COMMAND:-/app/scripts/ai_guide_grok.sh}
      - GUIDE_AI_CLI_USE_PROMPT_FILE=${GUIDE_AI_CLI_USE_PROMPT_FILE:-true}
      - GUIDE_AI_CLI_TIMEOUT_SEC=${GUIDE_AI_CLI_TIMEOUT_SEC:-180}
      - GUIDE_KNOWLEDGE_ROOT=${GUIDE_KNOWLEDGE_ROOT:-/app/knowledge/product-guide}
      - GUIDE_PROMPT_PATH=${GUIDE_PROMPT_PATH:-/app/prompts/product-guide.txt}
      - GUIDE_MAX_MESSAGE_CHARS=${GUIDE_MAX_MESSAGE_CHARS:-2000}
      - GUIDE_MAX_HISTORY_TURNS=${GUIDE_MAX_HISTORY_TURNS:-12}
      - GUIDE_SESSION_TTL_HOURS=${GUIDE_SESSION_TTL_HOURS:-24}
      - GUIDE_MAX_MESSAGES_PER_SESSION=${GUIDE_MAX_MESSAGES_PER_SESSION:-40}
      - GUIDE_RATE_LIMIT_PER_HOUR=${GUIDE_RATE_LIMIT_PER_HOUR:-20}
      - GUIDE_STREAM_CHUNK_CHARS=${GUIDE_STREAM_CHUNK_CHARS:-48}
      - GUIDE_NATIVE_STREAM=${GUIDE_NATIVE_STREAM:-true}
      - GROK_BIN=${GROK_BIN:-grok}
      - GUIDE_SERVICE_TOKEN=${GUIDE_SERVICE_TOKEN:-}
      - GUIDE_REQUIRE_TOKEN=${GUIDE_REQUIRE_TOKEN:-false}
      - GUIDE_ARTIFACT_ROOT=${GUIDE_ARTIFACT_ROOT:-/data/guide}
      # Entitlement read (prod): point at nocloud commercial DB
      - BILLING_ADAPTER=${BILLING_ADAPTER:-stub}
      - DATABASE_URL=${ENTITLEMENT_DATABASE_URL:-}
    volumes:
      - support_data:/data
      - ${GROK_HOME:-${HOME}/.grok}:/root/.grok
      - ${CODE_ROOT_APPLIANCE_CONSOLE}:${CODE_ROOT_APPLIANCE_CONSOLE}
      - ${CODE_ROOT_APPLIANCE_BACKEND}:${CODE_ROOT_APPLIANCE_BACKEND}

volumes:
  support_data:
  support_pg:
